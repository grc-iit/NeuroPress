# Pipeline: GPUCompress LAMMPS single-cell run for Figure 8, balanced policy.
#
# Uses the "lammps_7_1_fast_test" canonical params (per the user's project
# memory as the textbook MAPE convergence curve the paper should reproduce):
# LMP_ATOMS=64, T_COLD=0.5, T_HOT=2.5, SIM_INTERVAL=100, TIMESTEPS=4,
# ERROR_BOUND=0.001. See figure_8/README.md for the
# "NVT ramp vs NVE" caveat — the single-cell deck uses NVE here.
#
# Load + run:
#   jarvis ppl load yaml /u/$USER/GPUCompress/evaluations/figure_8/pipeline_lammps_balanced.yaml
#   jarvis ppl run

name: gpucompress_lammps_delta_single_node
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
container_ssh_port: 2243
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  - pkg_type: gpucompress_pkgs.gpucompress_lammps_delta
    pkg_name: gpuc_lammps
    cuda_arch: 80
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    atoms: 64
    timesteps: 4
    sim_interval: 100
    warmup_steps: 100
    chunk_mb: 4
    verify: 0

    t_hot: 2.5
    t_cold: 0.5
    hot_radius_frac: 0.25

    nprocs: 1
    ppn: 1
    num_gpus: 1

    hdf5_mode: vol
    phase: nn-rl+exp50
    policy: balanced
    error_bound: 0.001

    sgd_lr: 0.2
    sgd_mape: 0.10
    explore_k: 4
    explore_thresh: 0.20

    results_dir: $HOME/GPUCompress/tmp/figure_8_lammps
    results_dir_policy_suffix: true  # auto-appends _<policy> so flipping policy writes to distinct dirs
