# Pipeline: GPUCompress WarpX single-cell run for Figure 5 (anatomy pies).
#
# WarpX uses the single-cell dump-then-replay shape: Phase 1 dumps raw
# .f32 fields from a short LWFA run, Phase 2 runs generic_benchmark on
# them with the GPUCompress VOL. The anatomy per-timestep CSV is
# produced by Phase 2 (generic_benchmark with GPUCOMPRESS_DETAILED_TIMING=1).
#
# Usage:
#   jarvis ppl load yaml /u/$USER/GPUCompress/evaluations/figure_5/pipeline_warpx.yaml
#   jarvis ppl run
#   python3 /u/$USER/GPUCompress/evaluations/figure_5/plot_anatomy.py \
#           $HOME/GPUCompress/tmp/figure_5_warpx

name: gpucompress_figure_5_warpx
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
container_ssh_port: 2260
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  - pkg_type: gpucompress_pkgs.gpucompress_warpx_delta
    pkg_name: gpuc_warpx
    cuda_arch: 80
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    # LWFA grid sized for a ~2-4 min anatomy run. The VOL runs during
    # Phase 2 (generic_benchmark) so per-dump size here is about the
    # flat-fields replay, not the live WarpX sim.
    ncell: "64 64 128"
    max_step: 50
    diag_int: 10
    max_grid_size: ''
    blocking_factor: ''
    chunk_mb: 8
    verify: 0

    hdf5_mode: vol
    phase: nn-rl
    policy: balanced
    error_bound: 0.0

    sgd_lr: 0.2
    sgd_mape: 0.10
    explore_k: 4
    explore_thresh: 0.20

    results_dir: $HOME/GPUCompress/tmp/figure_5_warpx
