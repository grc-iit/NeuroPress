# Pipeline: GPUCompress LAMMPS single-cell run for Figure 5 (anatomy pies).
#
# LAMMPS is in-situ: fix_gpucompress_kokkos writes via the VOL directly
# during the MD run. Per-stage timing columns come from the fix's
# chunk-logging path (LAMMPS_LOG_CHUNKS=1 + GPUCOMPRESS_DETAILED_TIMING=1,
# both set by the single-cell package).
#
# Usage:
#   jarvis ppl load yaml /u/$USER/GPUCompress/evaluations/figure_5/pipeline_lammps.yaml
#   jarvis ppl run
#   python3 /u/$USER/GPUCompress/evaluations/figure_5/plot_anatomy.py \
#           $HOME/GPUCompress/tmp/figure_5_lammps

name: gpucompress_figure_5_lammps
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
container_ssh_port: 2261
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  - pkg_type: gpucompress_pkgs.gpucompress_lammps_delta
    pkg_name: gpuc_lammps
    cuda_arch: 80
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    # 4*40^3 = 256k atoms, ~9 MiB/dump, 5 dumps.
    atoms: 40
    timesteps: 5
    sim_interval: 100
    warmup_steps: 100
    chunk_mb: 8
    verify: 0

    t_hot: 10.0
    t_cold: 0.01
    hot_radius_frac: 0.25

    nprocs: 1
    ppn: 1
    num_gpus: 1

    hdf5_mode: vol
    phase: nn-rl
    policy: balanced
    error_bound: 0.0

    sgd_lr: 0.2
    sgd_mape: 0.10
    explore_k: 4
    explore_thresh: 0.20

    results_dir: $HOME/GPUCompress/tmp/figure_5_lammps
