# Pipeline: GPUCompress Nyx single-cell run for Figure 5 (anatomy pies).
#
# Nyx uses the single-cell dump-then-replay shape: Phase 1 runs
# nyx_HydroTests with NYX_DUMP_FIELDS=1, Phase 2 replays the dumps
# through generic_benchmark. The VOL runs during Phase 2, so the
# anatomy per-timestep CSV is produced there.
#
# Usage:
#   jarvis ppl load yaml /u/$USER/GPUCompress/evaluations/figure_5/pipeline_nyx.yaml
#   jarvis ppl run
#   python3 /u/$USER/GPUCompress/evaluations/figure_5/plot_anatomy.py \
#           $HOME/GPUCompress/tmp/figure_5_nyx

name: gpucompress_figure_5_nyx
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
container_ssh_port: 2262
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  - pkg_type: gpucompress_pkgs.gpucompress_nyx_delta
    pkg_name: gpuc_nyx
    cuda_arch: 80
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    # 64^3 Sedov blast, 5 dumps.
    ncell: 64
    max_step: 50
    plot_int: 10
    chunk_mb: 8
    verify: 0

    hdf5_mode: vol
    phase: nn-rl
    policy: balanced
    error_bound: 0.0

    sgd_lr: 0.2
    sgd_mape: 0.10
    explore_k: 4
    explore_thresh: 0.20

    results_dir: $HOME/GPUCompress/tmp/figure_5_nyx
