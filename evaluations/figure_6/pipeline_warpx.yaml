# Pipeline: GPUCompress WarpX single-cell run in VOL trace mode.
#
# WarpX's single-cell path is dump-then-replay (Phase 1 dumps raw .f32 via
# WARPX_DUMP_FIELDS=1, Phase 2 replays through generic_benchmark). The VOL
# runs during Phase 2, so gpucompress_trace.csv lands under bench_dir:
#   <results_dir>/<hdf5_mode>_<bench_phase>/gpucompress_trace.csv
#
# Trace mode is ~32x slower than release; ncell and max_step are kept tiny
# so one run completes in minutes rather than hours.

# Name matches the cached WarpX SIF so Jarvis reuses it (skips rebuild).
name: gpucompress_warpx_delta_single_node
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
container_ssh_port: 2251
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  - pkg_type: gpucompress_pkgs.gpucompress_warpx_delta
    pkg_name: gpuc_warpx
    cuda_arch: 80
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    hdf5_mode: vol
    phase: nn-rl+exp50
    policy: balanced
    error_bound: 0.01

    ncell: "32 32 128"
    max_step: 30
    diag_int: 10
    max_grid_size: ''
    blocking_factor: ''
    chunk_mb: 4
    verify: 0

    sgd_lr: 0.2
    sgd_mape: 0.10
    explore_k: 4
    explore_thresh: 0.20

    # Shared FS so plot_trace.py can read trace.csv from the login node.
    results_dir: $HOME/GPUCompress/tmp/figure_6_warpx_trace
    vol_mode: trace
    timing_csv_name: gpucompress_io_timing.csv
    trace_csv_name: gpucompress_trace.csv
