name: gpucompress_warpx
env: gpucompress

pkgs:
  - pkg_type: gpucompress_pkgs.gpucompress_warpx
    pkg_name: warpx_benchmark
    nprocs: 1
    ppn: 1
    warpx_bin: /opt/sims/warpx/build-gpucompress/bin/warpx.3d
    inputs: /opt/sims/warpx/Examples/Physics_applications/laser_acceleration/inputs_base_3d
    gpucompress_dir: /opt/GPUCompress
    nvcomp_lib: /tmp/lib
    hdf5_lib: /tmp/hdf5-install/lib
    weights: /opt/GPUCompress/neural_net/weights/model.nnwt
    ncell: "32 32 256"
    max_step: 200
    diag_int: 10
    chunk_mb: 4
    policies: "balanced,ratio"
    error_bound: 0.01
    results_dir: /tmp/gpucompress_warpx_results
