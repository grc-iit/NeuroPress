# Pipeline: GPUCompress WarpX single-node on Delta — NO-COMP BASELINE variant.
#
# Identical to gpucompress_warpx_single_node.yaml except hdf5_mode=default
# (no compression). Use this to measure raw HDF5 I/O bandwidth alongside
# the adaptive run. Switch between the two by re-running `jarvis ppl load
# yaml <path>` before `jarvis ppl run`.
#
# Chains gpucompress_base + gpucompress_warpx_delta so the WarpX binary is
# built against HDF5 + nvcomp + GPUCompress.
#
# Usage:
#   # One-time, on the login node — ppl load yaml builds the SIF when
#   # install_manager=container (no separate `jarvis ppl build` step):
#   jarvis repo add /u/$USER/GPUCompress/gpucompress_pkgs
#   jarvis ppl load yaml /u/$USER/GPUCompress/gpucompress_pkgs/pipelines/gpucompress_warpx_single_node.yaml
#
#   # Per-run, on a GPU compute node:
#   salloc --account="$SLURM_ACCOUNT" --partition=gpuA100x4 \
#          --nodes=1 --ntasks=1 --gpus=1 --time=01:00:00 --mem=64g
#   hostname > ~/hostfile_single.txt
#   jarvis hostfile set ~/hostfile_single.txt
#   jarvis ppl run

name: gpucompress_warpx_delta_single_node
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
container_ssh_port: 2235
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  # 1. Install HDF5 + nvcomp + GPUCompress into the build image.
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  # 2. Build WarpX with the GPUCompress patches applied; this is the workload.
  - pkg_type: gpucompress_pkgs.gpucompress_warpx_delta
    pkg_name: gpuc_warpx
    cuda_arch: 80
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    # Physics — smoke-scale LWFA defaults.
    # Scale up for real runs (e.g. ncell="128 128 1024", max_step=200, diag_int=50).
    ncell: "32 32 256"
    max_step: 30
    diag_int: 10
    # AMR blocking — leave empty for WarpX defaults. Set only when tuning.
    max_grid_size: ""
    blocking_factor: ""

    # Benchmark configuration — NO-COMP baseline. Phase is ignored when
    # mode=default (pkg.py maps to the internal no-comp pseudo-phase).
    hdf5_mode: default
    phase: nn-rl+exp50    # ignored in default mode, kept valid for _validate()
    chunk_mb: 4
    verify: 1
    policy: ratio
    error_bound: 0.0
