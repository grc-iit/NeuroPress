name: gpucompress_vpic
env: gpucompress

pkgs:
  - pkg_type: gpucompress_pkgs.gpucompress_vpic
    pkg_name: vpic_benchmark
    nprocs: 1
    ppn: 1
    vpic_deck: /opt/GPUCompress/benchmarks/vpic-kokkos/vpic_benchmark_deck.Linux
    gpucompress_dir: /opt/GPUCompress
    nvcomp_lib: /tmp/lib
    hdf5_lib: /tmp/hdf5-install/lib
    weights: /opt/GPUCompress/neural_net/weights/model.nnwt
    nx: 200
    chunk_mb: 4
    timesteps: 20
    warmup_steps: 500
    sim_interval: 190
    policies: "balanced,ratio,speed"
    error_bound: 0.0
    sgd_lr: 0.2
    sgd_mape: 0.10
    explore_k: 4
    explore_thresh: 0.20
    results_dir: /tmp/gpucompress_vpic_results
