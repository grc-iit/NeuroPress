# Pipeline: GPUCompress WarpX LWFA single-node on Delta via Apptainer.
#
# Mirrors gpucompress_nyx_single_node.yaml but chains our WarpX package so
# the WarpX binary is built against HDF5 + nvcomp + GPUCompress.
#
# Usage:
#   # One-time, on the login node (has network + no GPU needed for build):
#   jarvis repo add /u/imuradli/GPUCompress/gpucompress_pkgs
#   jarvis ppl load yaml /u/imuradli/GPUCompress/gpucompress_pkgs/pipelines/gpucompress_warpx_single_node.yaml
#   jarvis ppl build            # produces ~/.ppi-jarvis/pipelines/<name>/shared/<name>.sif
#
#   # Per-run, on a GPU compute node:
#   salloc --account=bekn-delta-gpu --partition=gpuA100x4 \
#          --nodes=1 --ntasks=4 --gpus=1 --time=02:00:00 --mem=64g
#   scontrol show hostnames $SLURM_JOB_NODELIST > ~/hostfile_single.txt
#   jarvis hostfile set ~/hostfile_single.txt
#   jarvis ppl run

name: gpucompress_warpx_delta_single_node
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
container_ssh_port: 2235
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  # 1. Install HDF5 + nvcomp + GPUCompress into the build image.
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  # 2. Build WarpX with the GPUCompress patches applied; this is the workload.
  - pkg_type: gpucompress_pkgs.gpucompress_warpx_delta
    pkg_name: gpuc_warpx
    cuda_arch: 80
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    # Physics — matches bench_tests/warpx.sh smoke defaults.
    # Scale up for real runs (e.g. ncell="128 128 1024", max_step=200, diag_int=50).
    ncell: "32 32 256"
    max_step: 30
    diag_int: 10
    # AMR blocking — leave empty for WarpX defaults. Set only when tuning.
    max_grid_size: ""
    blocking_factor: ""

    # Benchmark configuration — VOL mode with NN + RL + 50% exploration.
    hdf5_mode: vol
    phase: nn-rl+exp50
    chunk_mb: 4
    verify: 1
    policy: ratio
    error_bound: 0.01
