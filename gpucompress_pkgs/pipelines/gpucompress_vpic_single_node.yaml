# Pipeline: GPUCompress VPIC single-node on Delta via Apptainer.
#
# Mirrors the reference at:
#   ~/jarvis-cd/builtin/pipelines/portability/delta/vpic_single_node.yaml
# but chains our custom gpucompress_base + gpucompress_vpic_delta packages so
# the VPIC benchmark deck is built against HDF5 + nvcomp + GPUCompress.
#
# Reproduces bench_tests/vpic.sh (retrievable via
#   git show 3c66e01:bench_tests/vpic.sh
# ) — single-phase VPIC Harris-sheet magnetic-reconnection benchmark with
# GPU compression dispatched inline by the deck binary.
#
# Usage:
#   # One-time, on the login node (has network + no GPU needed for build):
#   jarvis repo add /u/imuradli/GPUCompress/gpucompress_pkgs
#   jarvis ppl load yaml /u/imuradli/GPUCompress/gpucompress_pkgs/pipelines/gpucompress_vpic_single_node.yaml
#   jarvis ppl build            # produces ~/.ppi-jarvis/pipelines/<name>/shared/<name>.sif
#
#   # Per-run, on a GPU compute node:
#   salloc --account=bekn-delta-gpu --partition=gpuA100x4 \
#          --nodes=1 --ntasks=4 --gpus=1 --time=02:00:00 --mem=64g
#   scontrol show hostnames $SLURM_JOB_NODELIST > ~/hostfile_single.txt
#   jarvis hostfile set ~/hostfile_single.txt
#   jarvis ppl run

name: gpucompress_vpic_delta_single_node
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
# Distinct from gpucompress_nyx_delta (2233) so both pipelines can be loaded
# simultaneously without port conflicts inside the apptainer instance.
container_ssh_port: 2234
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  # 1. Install HDF5 + nvcomp + GPUCompress into the build image.
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  # 2. Build VPIC-Kokkos with the GPUCompress benchmark deck linked in;
  #    this is the workload. Must follow gpucompress_base so that the
  #    GPUCompress headers / libs / deck sources are available at
  #    /opt/GPUCompress/ before build.sh's cmake + nvcc_wrapper steps.
  - pkg_type: gpucompress_pkgs.gpucompress_vpic_delta
    pkg_name: gpuc_vpic
    cuda_arch: 80
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    # MPI sizing — VPIC requires VPIC_NX to be divisible by nprocs.
    # Smoke test: 1 rank, NX=64. Scale up together (e.g. nprocs=4, nx=128).
    nprocs: 1
    ppn: 1

    # I/O volume — smoke-test defaults from bench_tests/vpic.sh (NX=64,
    # TIMESTEPS=3, SIM_INT=190, WARMUP=100, CHUNK=4 MB).
    nx: 64
    timesteps: 3
    sim_interval: 190
    warmup: 100
    chunk_mb: 4
    verify: 1

    # Physics — default Harris-sheet parameters.
    mi_me: 25
    wpe_wce: 3.0
    ti_te: 1.0
    perturbation: 0.1
    guide_field: 0.0
    nppc: 2

    # Benchmark configuration — VOL mode with adaptive NN + RL selection.
    hdf5_mode: vol
    phase: nn-rl
    policy: balanced
    error_bound: 0.0

    # NN online-learning knobs
    sgd_lr: 0.2
    sgd_mape: 0.10
    explore_k: 4
    explore_thresh: 0.20
