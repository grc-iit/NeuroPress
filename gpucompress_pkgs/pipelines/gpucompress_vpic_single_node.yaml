# Pipeline: GPUCompress VPIC single-node on Delta via Apptainer.
#
# Chains gpucompress_base + gpucompress_vpic_delta so the VPIC benchmark
# deck is built against HDF5 + nvcomp + GPUCompress. Single-phase workload
# (Harris-sheet magnetic-reconnection) with GPU compression dispatched
# inline by the deck binary.
#
# Usage:
#   # One-time, on the login node — ppl load yaml builds the SIF when
#   # install_manager=container (no separate `jarvis ppl build` step):
#   jarvis repo add /u/$USER/GPUCompress/gpucompress_pkgs
#   jarvis ppl load yaml /u/$USER/GPUCompress/gpucompress_pkgs/pipelines/gpucompress_vpic_single_node.yaml
#
#   # Per-run, on a GPU compute node:
#   salloc --account="$SLURM_ACCOUNT" --partition=gpuA100x4 \
#          --nodes=1 --ntasks=1 --gpus=1 --time=01:00:00 --mem=64g
#   hostname > ~/hostfile_single.txt
#   jarvis hostfile set ~/hostfile_single.txt
#   jarvis ppl run

name: gpucompress_vpic_delta_single_node
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
# Distinct from gpucompress_nyx_delta (2233) so both pipelines can be loaded
# simultaneously without port conflicts inside the apptainer instance.
container_ssh_port: 2234
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  # 1. Install HDF5 + nvcomp + GPUCompress into the build image.
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  # 2. Build VPIC-Kokkos with the GPUCompress benchmark deck linked in;
  #    this is the workload. Must follow gpucompress_base so that the
  #    GPUCompress headers / libs / deck sources are available at
  #    /opt/GPUCompress/ before build.sh's cmake + nvcc_wrapper steps.
  - pkg_type: gpucompress_pkgs.gpucompress_vpic_delta
    pkg_name: gpuc_vpic
    cuda_arch: 80
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    # MPI sizing — VPIC requires VPIC_NX to be divisible by nprocs.
    nprocs: 1
    ppn: 1

    # I/O volume — smaller run with chunk_mb=4 for anatomy comparison.
    # (98)^3 * 64 B ≈ 60 MiB/dump; 10 dumps -> ~600 MiB total (~15% of the
    # NX=150 run). Smaller chunks amortize fixed per-chunk overhead less,
    # so the anatomy pie should show NN Inference + Stats Kernel + I/O
    # Time growing as fractions and Compress Time shrinking.
    nx: 96
    timesteps: 10
    sim_interval: 190
    warmup: 300
    chunk_mb: 4
    verify: 1

    # Physics — default Harris-sheet parameters.
    mi_me: 25
    wpe_wce: 3.0
    ti_te: 1.0
    perturbation: 0.1
    guide_field: 0.0
    nppc: 2

    # Benchmark configuration — VOL mode with adaptive NN + RL selection.
    hdf5_mode: vol
    phase: nn-rl
    policy: balanced
    error_bound: 0.0

    # NN online-learning knobs
    sgd_lr: 0.2
    sgd_mape: 0.10
    explore_k: 4
    explore_thresh: 0.20

    # Output on shared FS (/u/... is visible from login + compute nodes)
    # instead of the package default /tmp which is node-local on Delta and
    # disappears when the allocation ends. Distinct from the smoke-test
    # output dir so both runs coexist for side-by-side anatomy comparison.
    results_dir: $HOME/GPUCompress/tmp/vpic_4mb
