# Pipeline: GPUCompress LAMMPS single-node on Delta — NO-COMP BASELINE variant.
#
# Identical to gpucompress_lammps_single_node.yaml except hdf5_mode=default
# (algo=lz4 is still in the code path but ratio is reported as 1.00).
# Use this to measure raw HDF5 I/O bandwidth alongside the adaptive run.
# Switch between the two by re-running `jarvis ppl load yaml <path>`
# before `jarvis ppl run`.
#
# Chains gpucompress_base + gpucompress_lammps_delta so the LAMMPS `lmp`
# binary is built against HDF5 + nvcomp + GPUCompress with the
# Kokkos-CUDA `fix gpucompress` compiled into src/KOKKOS/.
#
# Single-phase workflow: the LAMMPS fix writes compressed HDF5 in-situ
# during the MD run (producing gpuc_step_* output directories) and the
# package parses those host-side into a CSV — no separate generic_benchmark
# invocation.
#
# Usage:
#   # One-time, on the login node — ppl load yaml builds the SIF when
#   # install_manager=container (no separate `jarvis ppl build` step):
#   jarvis repo add /u/$USER/GPUCompress/gpucompress_pkgs
#   jarvis ppl load yaml /u/$USER/GPUCompress/gpucompress_pkgs/pipelines/gpucompress_lammps_single_node.yaml
#
#   # Per-run, on a GPU compute node:
#   salloc --account="$SLURM_ACCOUNT" --partition=gpuA100x4 \
#          --nodes=1 --ntasks=1 --gpus=1 --time=01:00:00 --mem=64g
#   hostname > ~/hostfile_single.txt
#   jarvis hostfile set ~/hostfile_single.txt
#   jarvis ppl run

name: gpucompress_lammps_delta_single_node
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
container_ssh_port: 2236
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  # 1. Install HDF5 + nvcomp + GPUCompress into the build image.
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  # 2. Clone + patch + build LAMMPS with the GPUCompress Kokkos fix.
  - pkg_type: gpucompress_pkgs.gpucompress_lammps_delta
    pkg_name: gpuc_lammps
    cuda_arch: 80
    kokkos_arch: AMPERE80      # A100; change to HOPPER90 for H100
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    # I/O volume — smoke-test defaults (ATOMS=40 → ~27 MB/dump, 3 dumps).
    # Scale up for real runs (e.g. atoms=120, timesteps=20).
    atoms: 40
    timesteps: 3
    sim_interval: 50
    warmup_steps: 20
    chunk_mb: 4
    verify: 1

    # Physics — shock-expansion LJ (hot sphere in cold FCC lattice).
    t_hot: 10.0
    t_cold: 0.01
    hot_radius_frac: 0.25

    # Benchmark configuration — NO-COMP baseline. Phase is ignored when
    # mode=default (pkg.py maps to the internal no-comp pseudo-phase).
    hdf5_mode: default
    phase: nn-rl     # ignored in default mode, kept valid for _validate()
    policy: balanced
    error_bound: 0.0

    # MPI / GPU launch (single A100).
    nprocs: 1
    ppn: 1
    num_gpus: 1
