name: gpucompress_grayscott
env: gpucompress

pkgs:
  - pkg_type: gpucompress_pkgs.gpucompress_grayscott
    pkg_name: grayscott_benchmark
    nprocs: 1
    ppn: 1
    gpucompress_dir: /opt/GPUCompress
    nvcomp_lib: /tmp/lib
    hdf5_lib: /tmp/hdf5-install/lib
    weights: /opt/GPUCompress/neural_net/weights/model.nnwt
    grid_size: 512
    steps: 1000
    chunk_mb: 8
    feed_rate: 0.04
    kill_rate: 0.06075
    phase: nn-rl+exp50
    policies: "balanced,ratio,speed"
    results_dir: /tmp/gpucompress_grayscott_results
