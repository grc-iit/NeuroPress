# Pipeline: GPUCompress Nyx single-node on Delta via Apptainer.
#
# Chains gpucompress_base + gpucompress_nyx_delta so the Nyx binary is built
# against HDF5 + nvcomp + GPUCompress.
#
# Usage:
#   # One-time, on the login node:
#   jarvis repo add /u/$USER/GPUCompress/gpucompress_pkgs
#   jarvis ppl load yaml /u/$USER/GPUCompress/gpucompress_pkgs/pipelines/gpucompress_nyx_single_node.yaml
#   jarvis ppl build
#
#   # Per-run, on a GPU compute node:
#   salloc --account="$SLURM_ACCOUNT" --partition=gpuA100x4 \
#          --nodes=1 --ntasks=1 --gpus=1 --time=02:00:00 --mem=64g
#   hostname > ~/hostfile_single.txt
#   jarvis hostfile set ~/hostfile_single.txt
#   jarvis ppl run

name: gpucompress_nyx_delta_single_node
install_manager: container

container_engine: apptainer
container_base: nvidia/cuda:12.6.0-devel-ubuntu24.04
container_ssh_port: 2233
container_gpu: true

hostfile: $HOME/hostfile_single.txt

pkgs:
  # 1. Install HDF5 + nvcomp + GPUCompress into the build image.
  - pkg_type: gpucompress_pkgs.gpucompress_base
    pkg_name: gpuc_base
    cuda_arch: 80
    hdf5_version: 2.0.0
    nvcomp_version: 5.1.0.21_cuda12
    gpucompress_repo: https://github.com/grc-iit/GPUCompress.git
    gpucompress_ref: main
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

  # 2. Build Nyx with the GPUCompress patches applied; this is the workload.
  - pkg_type: gpucompress_pkgs.gpucompress_nyx_delta
    pkg_name: gpuc_nyx
    cuda_arch: 80
    use_gpu: true
    deploy_base: nvidia/cuda:12.6.0-runtime-ubuntu24.04

    # Physics — small-grid Sedov-blast defaults.
    # For longer paper-scale runs override on the command line or edit here
    # (e.g. ncell=192, max_step=200, plot_int=50).
    ncell: 64
    max_step: 30
    plot_int: 10

    # Benchmark configuration — VOL mode with NN + RL + 50% exploration.
    hdf5_mode: vol
    phase: nn-rl+exp50
    chunk_mb: 4
    verify: 1
    policy: ratio
    error_bound: 0.0
